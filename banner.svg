<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes draw-outer {
      0% { stroke-dashoffset: 520; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes draw-inner {
      0% { stroke-dashoffset: 260; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes reveal {
      0% { width: 0; }
      100% { width: 500px; }
    }
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .outer-tri {
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: draw-outer 2s ease-out 0.3s forwards;
    }
    .inner-tri {
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      animation: draw-inner 1.5s ease-out 1.2s forwards;
    }
    .name-mask rect {
      animation: reveal 1.8s steps(20) 0.8s forwards;
    }
    .tagline {
      opacity: 0;
      animation: fade-in 1s ease 2.8s forwards;
    }
    .cursor {
      animation: blink 0.8s step-end 0.8s 6;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="220" rx="6" fill="#161b22"/>

  <!-- Outer triangle -->
  <polygon points="90,185 90,35 170,185"
    fill="none" stroke="#7d8590" stroke-width="1.5"
    class="outer-tri"/>

  <!-- Inner triangle -->
  <polygon points="110,185 130,75 150,185"
    fill="none" stroke="#7d8590" stroke-width="1"
    class="inner-tri"/>

  <!-- Name text with reveal mask -->
  <defs>
    <clipPath id="name-clip" class="name-mask">
      <rect x="210" y="70" width="0" height="60"/>
    </clipPath>
  </defs>

  <text x="210" y="120" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="52" font-weight="600" fill="#e6edf3" letter-spacing="-1"
    clip-path="url(#name-clip)">Darkroom</text>

  <!-- Typing cursor -->
  <rect x="210" y="85" width="3" height="40" fill="#e6edf3" class="cursor"/>

  <!-- Tagline -->
  <text x="212" y="160" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="14" fill="#7d8590" letter-spacing="0.5" class="tagline">security research  /  systems engineering</text>

  <!-- Subtle bottom line -->
  <line x1="210" y1="170" x2="560" y2="170" stroke="#30363d" stroke-width="1" class="tagline"/>
</svg>
